name: Publish Catalog
on:
  push:
    branches: [main]
    paths:
      - 'skills/**'
      - '.github/workflows/publish.yml'

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      # Same pin as validate.yml — not cwidget-latest — per OFFICIAL_SKILLS_REPO_ALIGNMENT §6 / Slice §1.11 (bump only when the release notes require it).
      CWIDGET_VERSION: "0.5.0"
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Install cwidget
        run: |
          curl -sSL "https://releases.clawwidget.com/cwidget-${CWIDGET_VERSION}-linux-x64.tar.gz" | tar -xz
          sudo install -m 755 cwidget /usr/local/bin/

      - name: Build catalog + content-hashed skill copies (strict — official)
        run: |
          cwidget dev build-catalog \
            --source skills/official \
            --out dist/ \
            --registry official \
            --registry-url https://agents.clawwidget.com \
            --commit "${{ github.sha }}" \
            --strict

      - name: Catalog publish-time rules (CP001–CP005)
        run: cwidget validate --catalog-mode dist/

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: official-skills
          directory: dist/
